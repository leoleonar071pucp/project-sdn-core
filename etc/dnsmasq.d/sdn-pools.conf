# /etc/dnsmasq.d/sdn-pools.conf
# Configuración base SDN PUCP - pools por rol

# No usar /etc/resolv.conf del sistema
no-resolv

# Interfaz donde escucha (ajustar según la VM)
interface=eth0

# Tiempo de lease por defecto
dhcp-lease-max=200

# ── POOL CUARENTENA (antes de autenticarse) ──────────────────
# Cualquier MAC desconocida recibe IP de cuarentena
dhcp-range=tag:cuarentena,192.168.100.100,192.168.100.200,255.255.255.0,5m

# Redirigir todo el tráfico de cuarentena al portal cautivo
# (esto lo hacen las reglas OpenFlow, dnsmasq solo da la IP)
dhcp-option=tag:cuarentena,3,192.168.100.1      # gateway cuarentena
dhcp-option=tag:cuarentena,6,10.0.0.10          # DNS apunta al portal

# ── POOL VISITANTE ───────────────────────────────────────────
dhcp-range=tag:visitante,10.1.0.100,10.1.0.200,255.255.255.0,8h
dhcp-option=tag:visitante,3,10.1.0.1
dhcp-option=tag:visitante,6,8.8.8.8

# ── POOL ESTUDIANTE TELECOM ──────────────────────────────────
dhcp-range=tag:telecom,10.2.1.100,10.2.1.200,255.255.255.0,8h
dhcp-option=tag:telecom,3,10.2.1.1
dhcp-option=tag:telecom,6,8.8.8.8

# ── POOL ESTUDIANTE INFORMATICA ──────────────────────────────
dhcp-range=tag:informatica,10.2.2.100,10.2.2.200,255.255.255.0,8h
dhcp-option=tag:informatica,3,10.2.2.1
dhcp-option=tag:informatica,6,8.8.8.8

# ── POOL ESTUDIANTE ELECTRONICA ──────────────────────────────
dhcp-range=tag:electronica,10.2.3.100,10.2.3.200,255.255.255.0,8h
dhcp-option=tag:electronica,3,10.2.3.1
dhcp-option=tag:electronica,6,8.8.8.8

# ── POOL DOCENTE ─────────────────────────────────────────────
dhcp-range=tag:docente,10.3.0.100,10.3.0.200,255.255.255.0,10h
dhcp-option=tag:docente,3,10.3.0.1
dhcp-option=tag:docente,6,8.8.8.8

# ── POOL ADMIN TI ────────────────────────────────────────────
dhcp-range=tag:admin,10.4.0.100,10.4.0.200,255.255.255.0,12h
dhcp-option=tag:admin,3,10.4.0.1
dhcp-option=tag:admin,6,8.8.8.8

# ── RESERVAS DINÁMICAS ───────────────────────────────────────
# Este archivo es generado y actualizado por dhcp_manager.py
# No editar manualmente
conf-file=/etc/dnsmasq.d/reservations.conf