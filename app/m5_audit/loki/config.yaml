auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

storage_config:
  filesystem:
    directory: /loki/chunks

schema_config:
  configs:
    - from: "2025-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  retention_period: 72h

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  compaction_interval: 10m
  delete_request_store: filesystem

distributor:
  otlp_config:
    default_resource_attributes_as_index_labels:
      - service.name
      - event.domain
      - event.name
      - event.severity
      - session.id
      - host.ip