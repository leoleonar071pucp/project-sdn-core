services:

  suricata:
    image: jasonish/suricata:7.0
    profiles: ["deployment"]

    network_mode: host

    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
      - SYS_NICE
      - IPC_LOCK

    volumes:
      - ./suricata/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./suricata/rules:/etc/suricata/rules:ro
      - ./suricata/critical-assets.yaml:/etc/suricata/critical-assets.yaml:ro
      - ./logs:/var/log/suricata
      - /dev/hugepages:/dev/hugepages

    restart: unless-stopped


  evebox:
    image: jasonish/evebox:latest
    depends_on:
      - suricata
    ports:
      - "8181:5636"
    command:
      - evebox
      - server
      - "-D"
      - "/var/log/suricata/eve.json"
    volumes:
      - ./logs:/var/log/suricata
      - ./evebox:/var/lib/evebox

    restart: unless-stopped
