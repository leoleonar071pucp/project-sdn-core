version: "3.8"

services:
  nginx:
    image: nginx:stable
    container_name: sdn-srv-academicos
    ports:
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
      - "1443:1443"
      - "2443:2443"
      - "3443:3443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
      - /etc/sdn/certs:/etc/nginx/certs:ro
    restart: unless-stopped
