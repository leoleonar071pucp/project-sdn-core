version: "3.8"

services:
  nginx:
    image: nginx:stable
    container_name: sdn-srv-web
    ports:
      - "8080:8080"
      - "8081:8081"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
      - /etc/sdn/certs:/etc/nginx/certs:ro
    restart: unless-stopped
